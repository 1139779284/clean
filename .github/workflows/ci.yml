name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install pytest PyYAML pandas numpy opencv-python-headless pillow tqdm matplotlib
      - name: Static compile
        run: python -m compileall -q model_security_gate scripts tests
      - name: Pytest
        run: python -m pytest -q
      - name: CLI help smoke
        run: |
          python scripts/security_gate.py --help >/dev/null
          python scripts/strong_detox_yolo.py --help >/dev/null
          python scripts/detox_train_yolo.py --help >/dev/null
          python scripts/acceptance_gate.py --help >/dev/null
          python scripts/generate_report.py --help >/dev/null
          python scripts/eval_yolo_metrics.py --help >/dev/null
          python scripts/asr_aware_detox_yolo.py --help >/dev/null
          python scripts/run_asr_regression.py --help >/dev/null
