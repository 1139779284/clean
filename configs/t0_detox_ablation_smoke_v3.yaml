# v3 smoke config (Patches A+B+C+E applied).
#
# Purpose: validate that the four alignment patches actually fix the
# badnet_oda regression observed in v1/v2.  Launch command:
#
#   pixi run t0-detox-ablation-plan \
#     --spec configs/t0_detox_ablation_smoke_v3.yaml \
#     --out runs/t0_detox_ablation_smoke_v3_2026-05-11
#
# Success criteria (smoke-level):
#   * both arms complete without crashing;
#   * per-phase manifest shows pgbd_view_mode matching the phase (Patch E);
#   * replay_stats.added >= external_replay_floor_per_attack per attack (Patch B);
#   * asr_aware_config.attacks[].params.position == object_attached for
#     badnet_oda (Patch A);
#   * phase_finetune weights for oda_hardening show lambda_oda_recall >
#     lambda_task (Patch C);
#   * external hard-suite badnet_oda ASR < 3%  (vs 4.20% on v2).
#
# Expected wall-clock: ~35-50 min per arm on RTX 4060 Laptop.
spec:
  poisoned_model_id: best_2_poisoned
  poisoned_model_path: D:/clean_yolo/models/best_2_poisoned.pt
  teacher_model: null
  data_yaml: D:/clean_yolo/datasets/helmet_head_yolo_train_remap/data.yaml
  images: D:/clean_yolo/datasets/helmet_head_yolo_train_remap/images/train
  labels: D:/clean_yolo/datasets/helmet_head_yolo_train_remap/labels/train
  target_classes:
    - helmet
  external_eval_roots:
    - D:/clean_yolo/datasets/poison_benchmark_cuda_tuned_remap_v2
  external_replay_roots:
    - D:/clean_yolo/datasets/poison_benchmark_cuda_tuned_remap_v2
  out_root: runs/t0_detox_ablation_smoke_v3_2026-05-11

  imgsz: 416
  batch: 8
  cycles: 2                          # bump from 1 -> 2 so Patch B floor is exercised at least once on a shrinking failure list
  phase_epochs: 1
  feature_epochs: 1
  recovery_epochs: 1
  device: "0"

  max_images: 800
  eval_max_images: 100
  external_eval_max_images_per_attack: 40
  external_replay_max_images_per_attack: 120
  external_replay_floor_per_attack: 60   # Patch B: guarantee a floor of real samples per attack

  max_allowed_external_asr: 0.10
  max_map_drop: 0.05
  selection_max_map_drop: 0.08

  no_pre_prune: true

  notes: >
    Smoke run after Patches A (attack_zoo alignment), B (replay floor),
    C (ODA phase rebalance), E (phase-aware PGBD view).  Not a publication
    result.  Passes here unblock the 5-hour cycles=3 full ablation.

arms:
  - name: static_lambda
    use_lagrangian_controller: false
  - name: lagrangian_lambda
    use_lagrangian_controller: true
