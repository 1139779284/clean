# Smoke-size contribution-1 ablation.
#
# Mirrors runs/hybrid_purify_corrected_suite_smoke_2026-05-09 sizing so
# each arm fits under ~45 min on a single RTX 4060 (Laptop) at 8GB VRAM.
# Exact training command is emitted by:
#
#   pixi run t0-detox-ablation-plan \
#     --spec configs/t0_detox_ablation_smoke.yaml \
#     --out runs/t0_detox_ablation_smoke_2026-05-10
#
# The smoke run is NOT a publication result.  It is a plumbing and
# hyper-parameter sanity check that:
#   * both arms complete without crashing,
#   * Hybrid-PURIFY writes a manifest with external_json / clean_metrics,
#   * the planner re-scan converts both manifests into CFRC entries,
#   * CFRC emits a certificate (likely uncertified on such small eval sizes,
#     which is expected - small-n Wilson CIs and bootstrap bounds are wide).
#
# Expected wall-clock: ~30-45 min per arm on RTX 4060 Laptop.
spec:
  poisoned_model_id: best_2_poisoned
  poisoned_model_path: D:/clean_yolo/models/best_2_poisoned.pt
  teacher_model: null
  data_yaml: D:/clean_yolo/datasets/helmet_head_yolo_train_remap/data.yaml
  images: D:/clean_yolo/datasets/helmet_head_yolo_train_remap/images/train
  labels: D:/clean_yolo/datasets/helmet_head_yolo_train_remap/labels/train
  target_classes:
    - helmet
  external_eval_roots:
    - D:/clean_yolo/datasets/poison_benchmark_cuda_tuned_remap_v2
  external_replay_roots:
    - D:/clean_yolo/datasets/poison_benchmark_cuda_tuned_remap_v2
  out_root: runs/t0_detox_ablation_smoke_2026-05-10

  # --- Smoke sizing (mirrors prior 2026-05-09 smoke) ---
  imgsz: 416
  batch: 8
  cycles: 1
  phase_epochs: 1
  feature_epochs: 1
  recovery_epochs: 1
  device: "0"

  max_images: 800
  eval_max_images: 100
  external_eval_max_images_per_attack: 40
  external_replay_max_images_per_attack: 80

  # Relaxed acceptance for plumbing smoke; only used by Hybrid-PURIFY's
  # internal "passes" gate, not by CFRC.  CFRC keeps its own strict defaults.
  max_allowed_external_asr: 0.10
  max_map_drop: 0.05
  selection_max_map_drop: 0.08

  # RNP-lite adds ~5 min for tiny gain at smoke scale; skip to keep wall clock down.
  no_pre_prune: true

  notes: >
    Smoke-scale contribution-1 plumbing validation, not a publication result.
    Same arm structure as full; only sizing differs.  CFRC certificate
    emitted here is a pipeline check only - wide CIs are expected with
    eval-max-images-per-attack = 40.

arms:
  - name: static_lambda
    use_lagrangian_controller: false
  - name: lagrangian_lambda
    use_lagrangian_controller: true
