# v4 smoke: verify Patches A+B+C+E + Fix F1/F2 fix the WaNet regression.
#
# Budget: <= 30 min on RTX 4060 Laptop.
# Single arm (static_lambda).  cycles=1 with stop_on_pass disabled so all
# 5 phases (clean_anchor, oga, oda, wanet, clean_recovery) actually run;
# this is the whole point of Fix F1/F2 validation.
#
# Launch:
#   pixi run t0-detox-ablation-plan \
#     --spec configs/t0_detox_ablation_smoke_v4.yaml \
#     --out runs/t0_detox_ablation_smoke_v4_2026-05-11
# Then execute the emitted static_lambda command.
#
# Success criteria at smoke scale:
#   * Training does NOT early-exit at phase 2 (stop_on_pass=False).
#   * Phase plan contains: clean_anchor, oga_hardening, oda_hardening,
#     wanet_hardening, clean_recovery (F2 keeps WaNet after OGA).
#   * Per-phase manifest reports pgbd_view_mode matching phase (E).
#   * Final full-300 eval shows:
#     - badnet_oda <= 2.0%  (v3 got 1.75%, should stay <= that)
#     - wanet_oga <= 6.0%  (v3 blew up to 9.46%; should drop below poisoned baseline 5.74%)
#     - max_asr <= 7%       (v3 max was 9.46%)
spec:
  poisoned_model_id: best_2_poisoned
  poisoned_model_path: D:/clean_yolo/models/best_2_poisoned.pt
  teacher_model: null
  data_yaml: D:/clean_yolo/datasets/helmet_head_yolo_train_remap/data.yaml
  images: D:/clean_yolo/datasets/helmet_head_yolo_train_remap/images/train
  labels: D:/clean_yolo/datasets/helmet_head_yolo_train_remap/labels/train
  target_classes:
    - helmet
  external_eval_roots:
    - D:/clean_yolo/datasets/poison_benchmark_cuda_tuned_remap_v2
  external_replay_roots:
    - D:/clean_yolo/datasets/poison_benchmark_cuda_tuned_remap_v2
  out_root: runs/t0_detox_ablation_smoke_v4_2026-05-11

  imgsz: 416
  batch: 8
  cycles: 1
  phase_epochs: 1
  feature_epochs: 1
  recovery_epochs: 1
  device: "0"

  max_images: 800
  eval_max_images: 80
  external_eval_max_images_per_attack: 60
  external_replay_max_images_per_attack: 120

  max_allowed_external_asr: 0.10
  max_map_drop: 0.05
  selection_max_map_drop: 0.08

  no_pre_prune: true
  extra_cli:
    # Fix F1 guard: refuse early-exit unless each attack had >=120 samples.
    # Since eval uses 60 samples/attack, this means stop_on_pass can never fire;
    # combined with cycles=1 the plan runs exactly one full cycle.
    - "--min-passing-eval-n-per-attack"
    - "120"
    # Belt-and-braces: hard-disable early exit so all 5 phases run.
    - "--no-stop-on-pass"
    # Also set the floor for replay so F2's WaNet phase gets enough real data.
    - "--external-replay-floor-per-attack"
    - "80"

  notes: >
    Smoke validation of Fix F1 (early-exit guard) and Fix F2 (WaNet forced
    to follow OGA).  Single arm; the Lagrangian arm is deferred because
    both arms share the same plumbing and this smoke is about plumbing.

arms:
  - name: static_lambda
    use_lagrangian_controller: false
    notes: >
      Static lambda + Patches A/B/C/E + Fix F1/F2.
