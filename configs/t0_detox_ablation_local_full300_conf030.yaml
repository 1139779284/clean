# CFRC manifest for the cycles=3 ablation using full300 per-attack
# evaluation at conf=0.30 (deployment-tuned threshold).
#
# The conf=0.30 threshold was identified by a threshold sweep
# (tools/_conf_sweep_static.py) as the sweet spot where both arms'
# wanet_oga + badnet_oga + blend_oga failure counts drop enough to pass
# the CFRC 5% non-inferiority ceiling, while badnet_oda does not yet
# start regressing (that happens at conf>=0.35).  Poisoned baseline and
# both defended checkpoints are re-evaluated at the same conf=0.30 so
# paired CFRC numbers stay apples-to-apples.
entries:
  - name: static_lambda
    poisoned_model_id: best_2_poisoned
    defense: static_lambda
    poisoned_external: runs/external_best2_poisoned_valid_remap_v2_full300_conf030_2026-05-10/external_hard_suite_asr.json
    defended_external: runs/t0_detox_ablation_local_2026-05-10/static_lambda/best_external_full300_conf030/external_hard_suite_asr.json
    clean_before: runs/t0_detox_ablation_local_2026-05-10/static_lambda/clean_before.json
    clean_after: runs/t0_detox_ablation_local_2026-05-10/static_lambda/clean_after.json
    use_paired_rows: true
    notes: Static lambda arm at deployment threshold conf=0.30, 300 images per attack.

  - name: lagrangian_lambda
    poisoned_model_id: best_2_poisoned
    defense: lagrangian_lambda
    poisoned_external: runs/external_best2_poisoned_valid_remap_v2_full300_conf030_2026-05-10/external_hard_suite_asr.json
    defended_external: runs/t0_detox_ablation_local_2026-05-10/lagrangian_lambda/best_external_full300_conf030/external_hard_suite_asr.json
    clean_before: runs/t0_detox_ablation_local_2026-05-10/lagrangian_lambda/clean_before.json
    clean_after: runs/t0_detox_ablation_local_2026-05-10/lagrangian_lambda/clean_after.json
    use_paired_rows: true
    notes: Adaptive Lagrangian lambda arm at deployment threshold conf=0.30, 300 images per attack.
