  #   defended_external: runs/neural_cleanse_lite_best2/external_hard_suite_asr.json
  #   clean_before: runs/eval_best_2_poisoned_corrected.json
  #   clean_after:  runs/neural_cleanse_lite_best2/eval_clean_metrics.json
