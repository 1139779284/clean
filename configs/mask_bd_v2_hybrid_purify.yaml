hybrid_purify_detox:
  # Focused attack spec for mask_bd_v2_poisoned.pt.
  # The external root is named badnet_oga_mask_bd_v2_visible so the hard-suite
  # remains traceable to the source model, while the phase planner and
  # Lagrangian controller use the canonical badnet_oga attack family.
  attacks:
    - name: badnet_oga
      kind: badnet_patch
      goal: oga
      poison_negative: true
      poison_positive: false
      params:
        patch_frac: 0.09
        position: br
